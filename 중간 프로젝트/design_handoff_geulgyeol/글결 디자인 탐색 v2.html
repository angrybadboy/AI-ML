<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>글결 — 디자인 탐색 v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"/>
<link rel="stylesheet" href="styles/theme.css"/>
<style>
  html, body { margin:0; padding:0; background:#1a1815; }
  body { font-family: "Inter Tight", "Pretendard", system-ui, sans-serif; }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  button { font: inherit; cursor: pointer; }
  ::selection { background: rgba(74,107,138,0.25); }

  /* Theme toggle pill — fixed top-right of viewport */
  .theme-toggle {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(20,18,15,0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 24px;
    padding: 4px;
    font-family: "Inter Tight", system-ui, sans-serif;
    font-size: 12px;
    letter-spacing: 0.06em;
  }
  .theme-toggle button {
    border: 0;
    background: transparent;
    color: rgba(255,255,255,0.55);
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background .15s, color .15s;
  }
  .theme-toggle button.active {
    background: rgba(255,255,255,0.92);
    color: #14110e;
  }
  .theme-toggle svg { width: 13px; height: 13px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="scripts/v2/shared.jsx"></script>
<script type="text/babel" src="scripts/v2/core-screens.jsx"></script>
<script type="text/babel" src="scripts/v2/landings.jsx"></script>
<script type="text/babel" src="scripts/v2/landing-hybrid.jsx"></script>
<script type="text/babel" src="scripts/v2/system-card.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function ThemeToggle({ theme, setTheme }) {
  return (
    <div className="theme-toggle">
      <button className={theme==="light"?"active":""} onClick={()=>setTheme("light")}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M5 19l2-2M17 7l2-2"/></svg>
        새벽 안개
      </button>
      <button className={theme==="dark"?"active":""} onClick={()=>setTheme("dark")}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M20 14A8 8 0 1110 4a7 7 0 0010 10z"/></svg>
        밤하늘 잉크
      </button>
    </div>
  );
}

function ThemedFrame({ theme, children, w, h }) {
  return (
    <div data-theme={theme} style={{width:w, minHeight:h, background:"var(--bg)"}}>
      {children}
    </div>
  );
}

function App() {
  const [theme, setTheme] = useState("light");

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  // helper to wrap each artboard in a themed frame
  const T = (Comp, w, h) => (
    <ThemedFrame theme={theme} w={w} h={h}>
      <Comp/>
    </ThemedFrame>
  );

  return (
    <>
      <ThemeToggle theme={theme} setTheme={setTheme}/>
      <DesignCanvas>
        <DCSection id="system" title="00 · 통합 디자인 시스템" subtitle="라이트(새벽 안개) ↔ 다크(밤하늘 잉크) — 우측 상단 토글로 전환">
          <DCArtboard id="sys" label="System v0.2" width={1440} height={1200}>
            {T(SystemCardV2, 1440, 1200)}
          </DCArtboard>
        </DCSection>

        <DCSection id="landings" title="01 · 랜딩 페이지 — 하이브리드 + 대안" subtitle="«오늘의 글 즉시» × «두 사람의 글방» 하이브리드가 메인, 이전 대안은 레퍼런스">
          <DCArtboard id="L0" label="★ 하이브리드 · 오늘의 글 + 두 사람의 글방" width={1440} height={2820}>
            {T(LandingHybrid, 1440, 2820)}
          </DCArtboard>
          <DCArtboard id="L2" label="대안 · 아카이브 인덱스" width={1440} height={1500}>
            {T(LandingArchive, 1440, 1500)}
          </DCArtboard>
          <DCArtboard id="L3" label="대안 · 숨 쉬는 한 문장" width={1440} height={980}>
            {T(LandingBreath, 1440, 980)}
          </DCArtboard>
        </DCSection>

        <DCSection id="login" title="02 · 로그인 / 회원가입" subtitle="조용한 입장">
          <DCArtboard id="login" label="Login · 통합" width={1440} height={980}>
            {T(UScreenLogin, 1440, 980)}
          </DCArtboard>
        </DCSection>

        <DCSection id="today" title="03 · 오늘의 글 (읽기 화면)" subtitle="핵심 시나리오 — 하루 한 편을 온전히 읽기">
          <DCArtboard id="today" label="Today · 통합" width={1440} height={1460}>
            {T(UScreenToday, 1440, 1460)}
          </DCArtboard>
        </DCSection>

        <DCSection id="feed" title="04 · 발견 피드" subtitle="다른 사용자의 공개 글결">
          <DCArtboard id="feed" label="Feed · 통합" width={1440} height={1570}>
            {T(UScreenFeed, 1440, 1570)}
          </DCArtboard>
        </DCSection>

        <DCSection id="editor" title="05 · 글귀 작성 에디터" subtitle="제목 ≤ 40자 / 본문 ≤ 600자">
          <DCArtboard id="editor" label="Editor · 통합" width={1440} height={980}>
            {T(UScreenEditor, 1440, 980)}
          </DCArtboard>
        </DCSection>

        <DCSection id="profile" title="06 · 마이페이지" subtitle="간직한 글, 쓴 글, 감상 일기">
          <DCArtboard id="profile" label="Profile · 통합" width={1440} height={1100}>
            {T(UScreenProfile, 1440, 1100)}
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
